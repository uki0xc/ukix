name: Test AI LSR Fetch

on:
  push:
    branches:
      - beta
    paths:
      - .github/workflows/test_ai_lsr_fetch.yml
  workflow_dispatch:

jobs:
  test-ai-lsr-fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v6

      - name: Fetch AI.lsr and record result
        run: |
          set -euo pipefail

          mkdir -p ActionTest
          result="ActionTest/ai-lsr-github-actions.txt"
          body="$(mktemp)"
          headers="$(mktemp)"

          status="$(
            curl --max-time 30 -sS -L \
              -A "Loon/894 CFNetwork/3826.600.41 Darwin/24.6.0" \
              -D "$headers" \
              -o "$body" \
              -w "%{http_code}" \
              https://kelee.one/Tool/Loon/Lsr/AI.lsr || true
          )"

          {
            echo "# AI.lsr fetch test from GitHub Actions"
            echo
            echo "run_at=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S GMT+8')"
            echo "runner_os=${RUNNER_OS:-unknown}"
            echo "http_status=${status}"
            echo "body_bytes=$(wc -c < "$body" | tr -d ' ')"
            echo "body_sha256=$(sha256sum "$body" | awk '{print $1}')"
            if grep -Eiq '<!DOCTYPE|Just a moment|<html|</html>' "$body"; then
              echo "html_detected=yes"
            else
              echo "html_detected=no"
            fi
            echo
            echo "## Response Headers"
            sed -n '1,40p' "$headers"
            echo
            echo "## Rule Prefix Counts"
            awk -F, 'NF && $0 !~ /^#/ {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); print $1}' "$body" | sort | uniq -c
            echo
            echo "## First 60 Lines"
            sed -n '1,60p' "$body"
          } > "$result"

      - name: Commit test result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add ActionTest/ai-lsr-github-actions.txt
          if git diff --staged --quiet; then
            echo "No test result changes to commit."
          else
            git commit -m "test: record AI.lsr GitHub Actions fetch result"
            git push
          fi
