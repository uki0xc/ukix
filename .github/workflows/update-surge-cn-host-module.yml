name: Update Surge CN Host Module

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. This is Monday 11:15 in Asia/Shanghai.
    - cron: "15 3 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Surge module
        env:
          CN_LIST_URL: https://raw.githubusercontent.com/Reukix/ukix/refs/heads/main/Rule/CN.list
          OUTPUT: Script/CN-Host-DNS.sgmodule
          CN_DNS: 223.5.5.5
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp)"
          body="$(mktemp)"
          output_tmp="$(mktemp)"

          curl -fsSL "$CN_LIST_URL" -o "$tmp"
          mkdir -p "$(dirname "$OUTPUT")"

          awk -F',' -v dns="$CN_DNS" '
            function trim(s) {
              gsub(/^[ \t\r\n]+|[ \t\r\n]+$/, "", s)
              return s
            }

            function valid_domain(s) {
              return s ~ /^[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+$/
            }

            function add_host(s) {
              s = trim(tolower(s))
              sub(/\.$/, "", s)
              if (valid_domain(s)) {
                hosts[s] = "server:" dns
              } else {
                invalid++
              }
            }

            function add_suffix(s) {
              s = trim(tolower(s))
              sub(/\.$/, "", s)
              if (valid_domain(s)) {
                hosts[s] = "server:" dns
                hosts["*." s] = "server:" dns
              } else {
                invalid++
              }
            }

            /^[ \t]*($|#)/ { next }

            {
              total++
              type = trim(toupper($1))
              value = trim($2)

              if (type == "" || value == "") {
                invalid++
                next
              }

              if (type == "DOMAIN") {
                domain++
                add_host(value)
              } else if (type == "DOMAIN-SUFFIX") {
                suffix++
                add_suffix(value)
              } else {
                ignored[type]++
              }
            }

            END {
              for (host in hosts) {
                print host " = " hosts[host]
              }

              print "total=" total > "/dev/stderr"
              print "domain=" domain > "/dev/stderr"
              print "suffix=" suffix > "/dev/stderr"
              print "invalid=" invalid > "/dev/stderr"
              for (type in ignored) {
                print "ignored_" type "=" ignored[type] > "/dev/stderr"
              }
            }
          ' "$tmp" | sort -u > "$body"

          mapping_count="$(wc -l < "$body" | tr -d ' ')"
          generated_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          {
            echo "#!name=CN Host DNS"
            echo "#!desc=CN domains use 223.5.5.5. Generated by GitHub Actions."
            echo "#!system=ios"
            echo
            echo "[Host]"
            echo "# Generated at $generated_at"
            echo "# Source: $CN_LIST_URL"
            echo "# Host mappings: $mapping_count"
            cat "$body"
            echo
          } > "$output_tmp"

          mv "$output_tmp" "$OUTPUT"

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Script/CN-Host-DNS.sgmodule
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Surge CN host module"
            git push
          fi
